<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Click the Cat</title>
</head>
<body>
    <img onclick="clickCat()" src="/images/Untitled11_20260603161412.png" height="300px">
    <div class="counter" id="counter">
        0
    </div>
    <script> 
        const counter = document.getElementById("counter");
        let count = 0;

        function clickCat() {
            count = count + 1;
            counter.textContent=count;
            return count;
        }
    </script>
</body>
</html>
